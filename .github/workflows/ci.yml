name: SentrixViz CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  SENTRIX_REF: ${{ vars.SENTRIX_REF || 'main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout SentrixViz
        uses: actions/checkout@v4
        with:
          path: SentrixViz

      - name: Checkout SentrixContracts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/SentrixContracts
          ref: ${{ env.SENTRIX_REF }}
          path: SentrixContracts

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install sentrix-contracts (keystone, first)
        run: python -m pip install -e ./SentrixContracts

      - name: Install SentrixViz + dev extras
        run: python -m pip install -e "./SentrixViz[dev]"

      - name: Show resolved environment
        run: python -m pip list

      - name: Run tests
        working-directory: SentrixViz
        # matplotlib runs headless (Agg); ffmpeg-dependent MP4 tests fall back to GIF/skip.
        env:
          MPLBACKEND: Agg
        run: python -m pytest
